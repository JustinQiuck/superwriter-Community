name: 报告 Bug
description: 提交一个可复现的问题。
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你帮助改进 SuperWriter。

        请勿包含 API 密钥、Supabase service role key、Cookie、私有 URL、数据库备份、真实用户数据或生产日志。
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 出了什么问题？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 列出触发该问题的精确步骤。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Node.js 版本、pnpm 版本、浏览器、Supabase 本地/云端。
      placeholder: "macOS 15, Node 20.x, pnpm 10.x, Chrome, 本地 Supabase"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 仅粘贴已脱敏的日志。
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过已有 issue。
          required: true
        - label: 我已移除所有密钥、隐私数据和真实用户内容。
          required: true
        - label: 此报告仅用于个人非商业用途，或我已获得书面授权。
          required: true
